
<style>
*{margin:0;padding:0;box-sizing:border-box;}
#gc{
  position:relative;
  width:100%;
  max-width:400px;
  margin:0.5rem auto;
  font-family:monospace;
  user-select:none;
}
#c{display:block;width:100%;height:auto;border-radius:12px;border:0.5px solid var(--color-border-tertiary);}
#hint{font-size:10px;color:var(--color-text-tertiary);text-align:center;padding:3px;margin-top:3px;}

/* タッチコントローラー */
#ctrl{
  position:absolute;
  bottom:12px;
  left:0;right:0;
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  padding:0 14px;
  pointer-events:none;
}
.dpad{display:flex;gap:6px;pointer-events:all;}
.abtn{pointer-events:all;}
.tbtn{
  width:60px;height:60px;border-radius:50%;
  background:rgba(0,0,0,0.35);
  border:2px solid rgba(255,255,255,0.4);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;cursor:pointer;
  transition:background 0.08s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.tbtn:active,.tbtn.on{background:rgba(255,255,255,0.35);}
.tbtn-j{
  width:68px;height:68px;
  background:rgba(220,50,50,0.4);
  border-color:rgba(255,100,100,0.6);
}
</style>

<div id="gc">
  <canvas id="c"></canvas>
  <div id="ctrl">
    <div class="dpad">
      <div class="tbtn" id="bl">◀</div>
      <div class="tbtn" id="br">▶</div>
    </div>
    <div class="abtn">
      <div class="tbtn tbtn-j" id="bj">↑</div>
    </div>
  </div>
  <div id="hint">◀▶ 移動 | ↑ ジャンプ | キーボード操作も可</div>
</div>

<script>
(function(){
const gc=document.getElementById('gc');
const cv=document.getElementById('c'),ctx=cv.getContext('2d');

// 縦型サイズ
const W=360,H=600,G=0.45;
cv.width=W;cv.height=H;

const STAGES=[
  {name:'1-1',theme:'草原',sky:'#5C94FC',gr:'#228B22',dirt:'#8B6914',GR:H-44,
   plats:[[0,H-44,300,44,'g'],[360,H-44,300,44,'g'],[720,H-44,500,44,'g'],
     [80,H-120,70,14,'b'],[180,H-170,70,14,'b'],[300,H-130,70,14,'b'],
     [420,H-180,70,14,'b'],[520,H-130,70,14,'b'],[640,H-170,80,14,'b'],
     [760,H-130,70,14,'b'],[860,H-180,70,14,'b'],[960,H-140,90,14,'b']],
   ens:[[140,H-68,0.8],[340,H-68,1],[560,H-68,0.9],[780,H-68,1.1],[660,H-184,0.8]],
   coins:[[90,H-140],[200,H-190],[320,H-150],[440,H-200],[540,H-150],[660,H-190],[780,H-150],[880,H-200],[970,H-160]],
   goal:[1100,H-260]},
  {name:'1-2',theme:'砂漠',sky:'#E8C87A',gr:'#C8A464',dirt:'#A07828',GR:H-44,
   plats:[[0,H-44,200,44,'g'],[260,H-44,200,44,'g'],[520,H-44,200,44,'g'],[780,H-44,500,44,'g'],
     [60,H-110,60,14,'b'],[180,H-160,60,14,'b'],[300,H-120,70,14,'b'],
     [420,H-170,60,14,'b'],[540,H-120,70,14,'b'],[660,H-170,60,14,'b'],
     [780,H-130,80,14,'b'],[900,H-180,70,14,'b'],[1020,H-140,80,14,'b']],
   ens:[[120,H-68,1],[320,H-68,1.2],[560,H-68,1],[780,H-68,1.3],[900,H-68,1],[440,H-184,1]],
   coins:[[70,H-130],[190,H-180],[310,H-140],[430,H-190],[550,H-140],[670,H-190],[790,H-150],[910,H-200],[1030,H-160]],
   goal:[1200,H-260]},
  {name:'1-3',theme:'雪山',sky:'#B8D4F0',gr:'#C8E8FF',dirt:'#8088A8',GR:H-44,
   plats:[[0,H-44,160,44,'g'],[220,H-44,120,44,'g'],[400,H-44,160,44,'g'],[620,H-44,160,44,'g'],[840,H-44,160,44,'g'],[1060,H-44,400,44,'g'],
     [50,H-100,55,14,'b'],[160,H-150,55,14,'b'],[270,H-110,60,14,'b'],
     [380,H-160,60,14,'b'],[490,H-110,55,14,'b'],[600,H-160,60,14,'b'],
     [710,H-110,55,14,'b'],[820,H-170,60,14,'b'],[940,H-120,65,14,'b'],[1070,H-170,65,14,'b']],
   ens:[[120,H-68,1.1],[340,H-68,0.9],[560,H-68,1.2],[780,H-68,1],[1000,H-68,1.2],[390,H-174,0.9],[1080,H-184,1]],
   coins:[[60,H-120],[170,H-170],[280,H-130],[390,H-180],[500,H-130],[610,H-180],[720,H-130],[830,H-190],[950,H-140],[1080,H-190]],
   goal:[1350,H-260]},
  {name:'1-4',theme:'洞窟',sky:'#1A1A2E',gr:'#3A2A1A',dirt:'#221A0A',GR:H-44,
   plats:[[0,H-44,180,44,'g'],[240,H-44,180,44,'g'],[480,H-44,180,44,'g'],[720,H-44,180,44,'g'],[960,H-44,500,44,'g'],
     [40,H-90,50,14,'b'],[140,H-140,50,14,'b'],[250,H-100,55,14,'b'],
     [360,H-150,55,14,'b'],[470,H-100,50,14,'b'],[580,H-160,55,14,'b'],
     [690,H-110,50,14,'b'],[800,H-165,55,14,'b'],[920,H-120,60,14,'b'],[1050,H-175,65,14,'b']],
   ens:[[100,H-68,1.3],[300,H-68,1.2],[540,H-68,1.4],[780,H-68,1.2],[1000,H-68,1.4],[150,H-154,1.1],[590,H-174,1.2],[1060,H-189,1.2]],
   coins:[[50,H-110],[150,H-160],[260,H-120],[370,H-170],[480,H-120],[590,H-180],[700,H-130],[810,H-185],[930,H-140],[1060,H-195]],
   goal:[1450,H-260]},
  {name:'1-5',theme:'城',sky:'#2C1810',gr:'#555',dirt:'#2a2a2a',GR:H-44,
   plats:[[0,H-44,160,44,'g'],[220,H-44,160,44,'g'],[440,H-44,160,44,'g'],[660,H-44,160,44,'g'],[880,H-44,160,44,'g'],[1100,H-44,500,44,'g'],
     [40,H-90,48,14,'b'],[140,H-145,48,14,'b'],[250,H-100,52,14,'b'],
     [360,H-155,52,14,'b'],[470,H-100,48,14,'b'],[580,H-160,52,14,'b'],
     [690,H-110,48,14,'b'],[800,H-170,55,14,'b'],[920,H-125,60,14,'b'],[1060,H-180,65,14,'b']],
   ens:[[100,H-68,1.6],[300,H-68,1.5],[540,H-68,1.7],[780,H-68,1.5],[1000,H-68,1.7],[150,H-159,1.4],[590,H-174,1.5],[810,H-184,1.5],[1070,H-194,1.6]],
   coins:[[50,H-110],[150,H-165],[260,H-120],[370,H-175],[480,H-120],[590,H-180],[700,H-130],[810,H-190],[930,H-145],[1070,H-200]],
   goal:[1550,H-260]},
];

let keys={},score=0,lives=3,coins=0,gst='title',camX=0,si=0;
let P,plats,ens,coinList,goal,particles=[],ta=0,sa=0,ca=0,fxMsg=null,fxT=0;

function spawnP(x,y,col,n=7){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,s=1.5+Math.random()*3;particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2.5,life:25,col,sz:3+Math.random()*3});}}
function showFX(m){fxMsg=m;fxT=80;}

function loadStage(i){
  const s=STAGES[i];camX=0;
  P={x:60,y:s.GR-32,w:22,h:30,vx:0,vy:0,onG:false,dead:false,inv:0,dir:1,fr:0,ft:0};
  plats=s.plats.map(([x,y,w,h,t])=>({x,y,w,h,t}));
  ens=s.ens.map(([x,y,spd])=>({x,y,w:22,h:22,vx:-spd,alive:true,vy:0,fr:0,ft:0}));
  coinList=s.coins.map(([x,y])=>({x,y,w:13,h:13,got:false,ay:0}));
  goal={x:s.goal[0],y:H-260,w:26,h:216,got:false};
  particles=[];sa=55;gst='stagein';
}

function overlap(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function collide(obj){
  obj.onG=false;
  for(let p of plats){
    if(!p.w)continue;
    if(obj.x+obj.w>p.x&&obj.x<p.x+p.w&&obj.vy>=0&&obj.y+obj.h>p.y&&obj.y+obj.h<p.y+p.h+7){
      obj.y=p.y-obj.h;obj.vy=0;obj.onG=true;
    }
  }
}
function die(){if(P.inv>0)return;lives--;spawnP(P.x+11,P.y+15,'#E24B4A',10);if(lives<=0)gst='gameover';else{P.dead=true;P.inv=85;P.vy=-11;P.vx=0;}}
function respawn(){const s=STAGES[si];P.x=60;P.y=s.GR-32;P.vx=0;P.vy=0;P.dead=false;P.inv=55;camX=0;gst='play';}

function update(){
  ta++;
  if(gst==='title'||gst==='gameover'||gst==='allclear')return;
  if(gst==='stagein'){sa--;if(sa<=0)gst='play';return;}
  if(fxT>0)fxT--;
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.18;p.life--;p.sz*=0.94;});
  particles=particles.filter(p=>p.life>0);
  if(gst==='stageclear'){ca++;if(ca>110){si++;if(si>=STAGES.length)gst='allclear';else loadStage(si);}return;}
  if(P.dead){P.vy+=G;P.y+=P.vy;P.inv--;if(P.inv<=0)respawn();return;}
  if(P.inv>0)P.inv--;
  const spd=3.2;
  if(keys['ArrowLeft']||keys['a']||keys['ml']){P.vx=-spd;P.dir=-1;}
  else if(keys['ArrowRight']||keys['d']||keys['mr']){P.vx=spd;P.dir=1;}
  else P.vx*=0.72;
  if((keys[' ']||keys['ArrowUp']||keys['w']||keys['mj'])&&P.onG){P.vy=-10.5;P.onG=false;}
  P.vy+=G;P.x+=P.vx;P.y+=P.vy;
  P.ft++;if(P.ft>8){P.fr=1-P.fr;P.ft=0;}
  collide(P);if(P.x<0)P.x=0;if(P.y>H+80){die();return;}
  for(let e of ens){
    if(!e.alive)continue;
    e.x+=e.vx;e.vy+=G;e.y+=e.vy;e.ft++;if(e.ft>12){e.fr=1-e.fr;e.ft=0;}
    collide(e);if(e.y>H+80){e.alive=false;continue;}
    if(e.onG){
      let el=false,er=false;
      for(let p of plats){if(!p.w)continue;if(e.x-2>=p.x&&e.x-2<p.x+p.w&&e.y+e.h>=p.y&&e.y+e.h<=p.y+p.h+2)el=true;if(e.x+e.w+2>p.x&&e.x+e.w+2<=p.x+p.w&&e.y+e.h>=p.y&&e.y+e.h<=p.y+p.h+2)er=true;}
      if(e.vx<0&&!el)e.vx*=-1;if(e.vx>0&&!er)e.vx*=-1;
    }
    if(P.inv===0&&overlap(P,{x:e.x,y:e.y,w:e.w,h:e.h})){
      if(P.vy>0&&P.y+P.h<e.y+e.h*0.6+4){e.alive=false;score+=100;P.vy=-7;spawnP(e.x+11,e.y,'#A0522D',5);showFX('+100');}
      else die();
    }
  }
  coinList.forEach(c=>{if(c.got)return;c.ay=Math.sin(Date.now()/400+c.x)*2.5;if(overlap(P,{x:c.x,y:c.y,w:c.w,h:c.h})){c.got=true;coins++;score+=50;spawnP(c.x+6,c.y+6,'#EF9F27',4);showFX('+50');}});
  if(!goal.got&&overlap(P,goal)){goal.got=true;score+=500+si*200;gst='stageclear';ca=0;spawnP(goal.x+13,goal.y+108,'#FFD700',18);}
  camX=Math.max(0,P.x-W*0.35);
}

function drawCloud(x,y,s){ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(x,y,11*s,0,Math.PI*2);ctx.arc(x+14*s,y-5*s,14*s,0,Math.PI*2);ctx.arc(x+30*s,y,11*s,0,Math.PI*2);ctx.fill();}
function drawBg(){
  const s=STAGES[si];ctx.fillStyle=s.sky;ctx.fillRect(0,0,W,H);
  if(s.sky!=='#1A1A2E'&&s.sky!=='#2C1810'){
    const cx=camX*0.18;
    drawCloud((60-cx%W+W*2)%W,35,1);drawCloud((220-cx%W+W*2)%W,50,0.8);drawCloud((340-cx%W+W*2)%W,30,0.9);
    if(s.sky==='#E8C87A'){ctx.fillStyle='#D4A030';ctx.beginPath();ctx.arc(W-45,45,22,0,Math.PI*2);ctx.fill();}
  } else {for(let i=0;i<25;i++){ctx.fillStyle='rgba(255,255,200,0.55)';ctx.fillRect((i*137+si*40)%W,((i*83)%80)+8,2,2);}}
}
function drawPlat(p){
  const px=p.x-camX;if(px+p.w<0||px>W)return;
  const s=STAGES[si];
  if(p.t==='g'){ctx.fillStyle=s.gr;ctx.fillRect(px,p.y,p.w,10);ctx.fillStyle=s.dirt;ctx.fillRect(px,p.y+10,p.w,p.h-10);}
  else{ctx.fillStyle='#C8A464';ctx.fillRect(px,p.y,p.w,p.h);ctx.fillStyle='#D4A96A';ctx.fillRect(px+2,p.y+2,p.w-4,3);ctx.strokeStyle='#A0522D';ctx.lineWidth=0.5;ctx.strokeRect(px,p.y,p.w,p.h);}
}
function drawEnemy(e){
  if(!e.alive)return;const x=e.x-camX,y=e.y;if(x<-25||x>W+25)return;
  const col=si===4?'#8B0000':si===3?'#4A3A6A':'#A0522D',col2=si===4?'#CC3333':si===3?'#6A5A9A':'#D2691E';
  ctx.fillStyle=col;ctx.fillRect(x+2,y,18,16);ctx.fillStyle=col2;ctx.fillRect(x,y+16,22,5);
  ctx.fillStyle='#F5DEB3';ctx.fillRect(x+3,y+3,5,8);ctx.fillRect(x+13,y+3,5,8);
  ctx.fillStyle='#111';ctx.fillRect(x+5,y+6,3,3);ctx.fillRect(x+13,y+6,3,3);
  ctx.fillStyle=col;if(e.fr===0){ctx.fillRect(x,y+21,8,4);ctx.fillRect(x+14,y+21,8,4);}else{ctx.fillRect(x-2,y+21,8,4);ctx.fillRect(x+16,y+21,8,4);}
}
function drawCoin(c){
  if(c.got)return;const x=c.x-camX,y=c.y+(c.ay||0);if(x<-15||x>W+15)return;
  ctx.fillStyle='#EF9F27';ctx.beginPath();ctx.arc(x+6,y+6,5.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FAC775';ctx.beginPath();ctx.arc(x+4,y+4,2,0,Math.PI*2);ctx.fill();
}
function drawGoal(){
  if(goal.got)return;const x=goal.x-camX;if(x<-35||x>W+35)return;
  ctx.fillStyle='#555';ctx.fillRect(x+11,goal.y,3,goal.h);
  const wave=Math.sin(Date.now()/200)*2.5;
  ctx.fillStyle='#E24B4A';ctx.beginPath();ctx.moveTo(x+14,goal.y+3);ctx.lineTo(x+22+wave,goal.y+9);ctx.lineTo(x+14,goal.y+16);ctx.fill();
  ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.fillText('GOAL',x+1,goal.y+28);
}
function drawMario(){
  const inv=P.inv;if(inv>0&&Math.floor(inv/5)%2===0)return;
  const x=Math.round(P.x-camX),y=Math.round(P.y),dir=P.dir,fr=P.fr;
  ctx.save();if(dir<0){ctx.translate(x+11,0);ctx.scale(-1,1);ctx.translate(-x-11,0);}
  ctx.fillStyle='#E24B4A';ctx.fillRect(x+2,y,18,12);
  ctx.fillStyle='#F5C4B3';ctx.fillRect(x+2,y+12,18,11);ctx.fillRect(x+4,y+3,13,9);
  ctx.fillStyle='#185FA5';ctx.fillRect(x,y+23,22,6);
  ctx.fillStyle='#E24B4A';ctx.fillRect(x-2,y+2,5,3);
  if(fr===0){ctx.fillStyle='#F5C4B3';ctx.fillRect(x,y+18,7,5);ctx.fillRect(x+15,y+18,7,5);ctx.fillStyle='#442E00';ctx.fillRect(x,y+23,7,6);ctx.fillRect(x+15,y+23,7,6);}
  else{ctx.fillStyle='#F5C4B3';ctx.fillRect(x-2,y+20,7,5);ctx.fillRect(x+17,y+20,7,5);ctx.fillStyle='#442E00';ctx.fillRect(x-2,y+25,7,4);ctx.fillRect(x+17,y+25,7,4);}
  ctx.fillStyle='#442E00';ctx.fillRect(x+4,y+10,3,3);ctx.fillRect(x+15,y+10,3,3);
  ctx.restore();
}
function drawParticles(){particles.forEach(p=>{ctx.globalAlpha=p.life/25;ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}
function drawHUD(){
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(0,0,W,30);
  ctx.fillStyle='#fff';ctx.font='bold 12px monospace';
  ctx.fillText('❤️x'+lives,8,20);
  ctx.textAlign='center';ctx.fillText('SCORE:'+score,W/2,20);
  ctx.textAlign='right';ctx.fillText('🪙x'+coins,W-8,20);
  ctx.textAlign='left';
  const s=STAGES[si];ctx.fillStyle='rgba(255,255,255,0.4)';ctx.font='9px monospace';ctx.fillText(s.name+' '+s.theme,8,H-8);
}
function drawFX(){if(!fxMsg||fxT<=0)return;const al=Math.min(fxT/25,1),y=H/2-40-(80-fxT)*0.4;ctx.globalAlpha=al;ctx.fillStyle='#FFD700';ctx.font='bold 24px monospace';ctx.textAlign='center';ctx.fillText(fxMsg,W/2,y);ctx.globalAlpha=1;ctx.textAlign='left';}
function drawTitle(){
  ctx.fillStyle='#1a1040';ctx.fillRect(0,0,W,H);
  for(let i=0;i<40;i++){ctx.fillStyle='rgba(255,255,255,0.5)';ctx.fillRect((i*137)%W,(i*83)%H,2,2);}
  const t=Math.sin(ta/28)*3;
  ctx.fillStyle='#FFD700';ctx.font='bold 48px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('AIrcade',W/2,H/2-80+t);
  ctx.fillStyle='#fff';ctx.font='bold 17px monospace';ctx.fillText('マリオ風アクション',W/2,H/2-30);
  if(Math.floor(ta/28)%2===0){ctx.fillStyle='#00f5d4';ctx.font='13px monospace';ctx.fillText('ジャンプボタンでスタート',W/2,H/2+40);}
  // ミニキャラ
  ctx.fillStyle='#E24B4A';ctx.fillRect(W/2-11+Math.sin(ta/18)*15,H/2+90,22,12);
  ctx.fillStyle='#F5C4B3';ctx.fillRect(W/2-11+Math.sin(ta/18)*15,H/2+102,22,10);
  ctx.fillStyle='#185FA5';ctx.fillRect(W/2-13+Math.sin(ta/18)*15,H/2+112,26,6);
  ctx.textAlign='left';ctx.textBaseline='alphabetic';
}
function drawStageIn(){drawBg();plats.forEach(drawPlat);ctx.fillStyle='rgba(0,0,0,0.62)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFD700';ctx.font='bold 28px monospace';ctx.textAlign='center';ctx.textBaseline='middle';const s=STAGES[si];ctx.fillText(s.name+' — '+s.theme,W/2,H/2);ctx.textAlign='left';ctx.textBaseline='alphabetic';}
function drawStageClear(){drawBg();plats.forEach(drawPlat);coinList.forEach(drawCoin);drawGoal();drawMario();drawParticles();ctx.fillStyle='rgba(0,0,0,0.52)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#FFD700';ctx.font='bold 36px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('STAGE CLEAR!',W/2,H/2-20);ctx.fillStyle='#fff';ctx.font='16px monospace';ctx.fillText('SCORE: '+score,W/2,H/2+25);ctx.textAlign='left';ctx.textBaseline='alphabetic';}
function drawGameOver(){ctx.fillStyle='rgba(0,0,0,0.88)';ctx.fillRect(0,0,W,H);ctx.fillStyle='#E24B4A';ctx.font='bold 40px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('GAME OVER',W/2,H/2-30);ctx.fillStyle='#fff';ctx.font='16px monospace';ctx.fillText('SCORE: '+score,W/2,H/2+15);if(Math.floor(ta/28)%2===0){ctx.fillStyle='#00f5d4';ctx.font='12px monospace';ctx.fillText('ジャンプボタンでリトライ',W/2,H/2+52);}ctx.textAlign='left';ctx.textBaseline='alphabetic';}
function drawAllClear(){ctx.fillStyle='#0a0020';ctx.fillRect(0,0,W,H);for(let i=0;i<60;i++){const x=(i*137+ta*2)%W,y=(i*83+ta)%H;ctx.fillStyle=`hsl(${(i*30+ta*3)%360},100%,70%)`;ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);ctx.fill();}ctx.fillStyle='#FFD700';ctx.font='bold 38px monospace';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('ALL CLEAR!!',W/2,H/2-40);ctx.fillStyle='#fff';ctx.font='18px monospace';ctx.fillText('FINAL: '+score,W/2,H/2+10);if(Math.floor(ta/28)%2===0){ctx.fillStyle='#00f5d4';ctx.font='12px monospace';ctx.fillText('ジャンプボタンでもう一度',W/2,H/2+52);}ctx.textAlign='left';ctx.textBaseline='alphabetic';}

function draw(){
  ctx.clearRect(0,0,W,H);
  if(gst==='title'){drawTitle();return;}
  if(gst==='gameover'){drawGameOver();return;}
  if(gst==='allclear'){drawAllClear();return;}
  if(gst==='stagein'){drawStageIn();return;}
  drawBg();plats.forEach(drawPlat);drawGoal();coinList.forEach(drawCoin);ens.forEach(drawEnemy);drawMario();drawParticles();drawHUD();drawFX();
  if(gst==='stageclear')drawStageClear();
}

function startGame(){score=0;lives=3;coins=0;si=0;loadStage(0);}

let lt=0;
function loop(ts){if(ts-lt>=16){update();draw();lt=ts;}requestAnimationFrame(loop);}

document.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key))e.preventDefault();
  if(e.key===' '||e.key==='ArrowUp'){
    if(gst==='title')startGame();
    else if(gst==='gameover'){score=0;lives=3;coins=0;si=0;loadStage(0);}
    else if(gst==='allclear'){score=0;lives=3;coins=0;si=0;gst='title';}
  }
});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

// タッチボタン
function addBtn(id,key){
  const b=document.getElementById(id);
  b.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;b.classList.add('on');},{passive:false});
  b.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;b.classList.remove('on');},{passive:false});
  b.addEventListener('mousedown',()=>{keys[key]=true;b.classList.add('on');});
  b.addEventListener('mouseup',()=>{keys[key]=false;b.classList.remove('on');});
}
addBtn('bl','ml');addBtn('br','mr');

const bj=document.getElementById('bj');
function jumpAction(){
  if(gst==='title')startGame();
  else if(gst==='gameover'){score=0;lives=3;coins=0;si=0;loadStage(0);}
  else if(gst==='allclear'){score=0;lives=3;coins=0;si=0;gst='title';}
  else{keys['mj']=true;bj.classList.add('on');}
}
bj.addEventListener('touchstart',e=>{e.preventDefault();jumpAction();},{passive:false});
bj.addEventListener('touchend',e=>{e.preventDefault();keys['mj']=false;bj.classList.remove('on');},{passive:false});
bj.addEventListener('mousedown',jumpAction);
bj.addEventListener('mouseup',()=>{keys['mj']=false;bj.classList.remove('on');});

requestAnimationFrame(loop);
})();
</script>
